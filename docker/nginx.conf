server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /selfhost-compose-wizard {
    return 301 /selfhost-compose-wizard/;
  }

  location ~ ^/selfhost-compose-wizard/(.*)$ {
    try_files /$1 /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
