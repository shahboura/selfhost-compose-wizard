name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Validate template field coverage
        run: npm run validate:templates

      - name: Validate links and references
        run: npm run validate:links

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Lighthouse accessibility/performance audit
        run: npx @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Generate Lighthouse badge endpoint JSON
        if: github.ref == 'refs/heads/main' && success()
        run: node ./scripts/generate-lighthouse-badges.mjs

      - name: Stage static site for GitHub Pages
        if: github.ref == 'refs/heads/main' && success()
        run: mkdir -p dist/lighthouse && cp .badge-data/*.json dist/lighthouse/ && touch dist/.nojekyll

      - name: Publish static site to gh-pages
        if: github.ref == 'refs/heads/main' && success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
