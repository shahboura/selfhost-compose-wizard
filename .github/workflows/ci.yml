name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Validate template field coverage
        run: npm run validate:templates

      - name: Validate links and references
        run: npm run validate:links

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Lighthouse accessibility/performance audit
        if: github.ref == 'refs/heads/main'
        run: npx @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Lighthouse accessibility/performance audit (PR, non-blocking)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npx @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Generate Lighthouse badge endpoint JSON
        if: github.ref == 'refs/heads/main' && success()
        run: node ./scripts/generate-lighthouse-badges.mjs

      - name: Stage static site for GitHub Pages
        if: github.ref == 'refs/heads/main' && success()
        run: mkdir -p dist/lighthouse && cp .badge-data/*.json dist/lighthouse/ && touch dist/.nojekyll

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload static site artifact for Pages
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./dist

      - name: Deploy GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
