# for better separation, better to put all immich related data in one folder.
services:
  immich-valkey:
    image: valkey/valkey:9-alpine
    container_name: Immich-VALKEY
    hostname: redis
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping || exit 1"]
    user: ${PUID}:${PGID}
    environment:
      TZ: ${TZ}
    volumes:
      - ${IMMICH_VALKEY_DATA}:/data:rw
    restart: on-failure:5

  immich-db:
    image: ghcr.io/immich-app/postgres:16-vectorchord0.5.3-pgvector0.8.1
    container_name: Immich-DB
    hostname: database
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE_NAME}", "-U", "${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128mb
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data:rw
    environment:
      TZ: ${TZ}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: HDD #Remove the red # in front of the – DB_STORAGE_TYPE=HDD if your database isn’t stored on SSDs.
    restart: on-failure:5

  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: Immich-SERVER
    user: ${PUID}:${PGID}
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    ports:
      - ${IMMICH_SERVER_PORT:-2283}:2283
    volumes:
      - ${UPLOAD_LOCATION}:/data:rw
      - /etc/localtime:/etc/localtime:ro
    restart: on-failure:10
    healthcheck:
      disable: false
    depends_on:
      immich-valkey:
        condition: service_healthy
      immich-db:
        condition: service_started

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: Immich-LEARNING
    user: ${PUID}:${PGID}
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      - ${UPLOAD_LOCATION}:/data:rw
      - ${IMMICH_CACHE_LOCATION}:/cache:rw 
      - ${IMMICH_CONFIG_LOCATION}:/config:rw
      - ${IMMICH_CONFIG_LOCATION}:/.config:rw
      - ${IMMICH_MATPLOTLIB_LOCATION}:/matplotlib:rw
    environment:
      - MPLCONFIGDIR=/matplotlib
      - TZ=${TZ}
    restart: on-failure:5
    healthcheck:
      disable: false
    depends_on:
      immich-db:
        condition: service_started
