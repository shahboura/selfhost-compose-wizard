# Immich stack
# Services are grouped by role: cache, database, app server, ML worker.

services:
  immich-valkey:
    image: valkey/valkey:9-alpine
    container_name: immich-valkey
    hostname: redis
    user: ${PUID}:${PGID}
    security_opt:
      - no-new-privileges:true
    environment:
      # Common runtime identity
      TZ: ${TZ}
    volumes:
      - ${IMMICH_VALKEY_DIR}:/data:rw
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping || exit 1"]
    restart: on-failure:5

  immich-db:
    image: ghcr.io/immich-app/postgres:16-vectorchord0.5.3-pgvector0.8.1
    container_name: immich-db
    hostname: database
    security_opt:
      - no-new-privileges:true
    environment:
      # Common runtime identity
      TZ: ${TZ}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USER}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: HDD #Remove the red # in front of the – DB_STORAGE_TYPE=HDD if your database isn’t stored on SSDs.
    volumes:
      - ${IMMICH_DB_DATA_DIR}:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${IMMICH_DB_NAME}", "-U", "${IMMICH_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128mb
    restart: on-failure:5

  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich-server
    user: ${PUID}:${PGID}
    security_opt:
      - no-new-privileges:true
    ports:
      - ${IMMICH_SERVER_PORT:-2283}:2283
    environment:
      # Common runtime identity
      TZ: ${TZ}
    env_file:
      - .env
    volumes:
      - ${IMMICH_UPLOAD_DIR}:/data:rw
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      disable: false
    depends_on:
      immich-valkey:
        condition: service_healthy
      immich-db:
        condition: service_started
    restart: on-failure:10

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-learning
    user: ${PUID}:${PGID}
    security_opt:
      - no-new-privileges:true
    environment:
      # Common runtime identity
      TZ: ${TZ}
      # ML runtime path override
      MPLCONFIGDIR: /matplotlib
    env_file:
      - .env
    volumes:
      - ${IMMICH_UPLOAD_DIR}:/data:rw
      - ${IMMICH_MODEL_CACHE_DIR}:/cache:rw
      - ${IMMICH_MODEL_CONFIG_DIR}:/config:rw
      - ${IMMICH_MODEL_CONFIG_DIR}:/.config:rw
      - ${IMMICH_MATPLOTLIB_DIR}:/matplotlib:rw
    healthcheck:
      disable: false
    depends_on:
      immich-db:
        condition: service_started
    restart: on-failure:5
