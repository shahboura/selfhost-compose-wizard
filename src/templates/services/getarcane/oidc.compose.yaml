# Arcane Docker Compose Configuration
# Generated at 1/18/2026, 12:57:52 PM

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - ${PORT:-3552}:3552
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-./arcane-data}:/app/data:rw
    environment:
      - APP_URL=${APP_URL:-http://localhost:3552}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
      - LOG_JSON=false
      - TZ=${TZ:-Etc/UTC}
      - AUTH_LOCAL_ENABLED=false
      - OIDC_ENABLED=true
      # OIDC_ISSUER_URL should not include a trailing slash.
      # Configure your provider callback URL as ${APP_URL}/auth/oidc/callback.
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile}
      - OIDC_ADMIN_CLAIM=${OIDC_ADMIN_CLAIM}
      - OIDC_ADMIN_VALUE=${OIDC_ADMIN_VALUE}
      - OIDC_MERGE_ACCOUNTS=${OIDC_MERGE_ACCOUNTS:-false}
      - DATABASE_URL=file:data/arcane.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(2500)&_txlock=immediate
      # - DOCKER_API_VERSION=1.43
    cgroup: host
    healthcheck:
      test: curl localhost:3552/api/health | grep \"status\":\"UP\"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
