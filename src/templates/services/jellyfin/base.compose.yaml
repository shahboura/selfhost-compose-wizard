services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: ${PUID}:${PGID}
    network_mode: host
    security_opt:
      - no-new-privileges:true
    environment:
      # Common runtime identity
      TZ: ${TZ}
    ports:
      - ${JELLYFIN_PORT}:8096
      - ${JELLYFIN_UDP_PORT}:7359/udp
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${JELLYFIN_CONFIG_DIR}:/config:rw
      - ${JELLYFIN_CACHE_DIR}:/cache:rw
      - ${JELLYFIN_LOGS_DIR}:/logs:rw
      - ${JELLYFIN_MOVIES_DIR}:/movies:rw
      - ${JELLYFIN_MUSIC_DIR}:/music:rw
      - ${JELLYFIN_TV_DIR}:/shows:rw
    devices:
      # Optional - only needed if you want to use hardware acceleration for video encoding/decoding
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/8096' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: on-failure:5
